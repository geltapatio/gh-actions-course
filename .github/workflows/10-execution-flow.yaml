name: 10 - Controlling the Execution Flow

on:
 workflow_dispatch:
  inputs:
    pass-unit-tests:
      description: 'All unit tests were executed successfully'
      type: boolean
      default: false

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Lint and build
        run: echo "Linting and building project"

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Running unit tests
        run: echo "Running testing ..."
      - name: Failing tests
        if: ${{ vars.pass-unit-tests == false }}
        run: exit 0

  deploy-notprod:
    runs-on: ubuntu-latest
    needs: [lint-build, unit-tests]
    steps:
      - name: Deploy to nonprod
        run: "Deploying to nonprod"

  e2e-tests:
    runs-on: ubuntu-latest
    needs:
      - deploy-notprod
    steps:
      - name: Running E2E tests
        run: "Running E2E tests"

  load-tests:
    runs-on: ubuntu-latest
    needs:
      - deploy-notprod
    steps:
      - name: Running load tests
        run: "Running load tests"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [e2e-tests, load-tests]
    steps:
      - name: Deploying to prod
        run: "Deploying to prod ..."